<!-- Grid Overlay — paste inside <body> or inject via JS (grid-overlay.js) -->

<div class="grid-overlay">
  <div class="grid-overlay__columns">
    <div class="grid-overlay__column"><span class="grid-overlay__label">1</span></div>
    <div class="grid-overlay__column"><span class="grid-overlay__label">2</span></div>
    <div class="grid-overlay__column"><span class="grid-overlay__label">3</span></div>
    <div class="grid-overlay__column"><span class="grid-overlay__label">4</span></div>
    <div class="grid-overlay__column"><span class="grid-overlay__label">5</span></div>
    <div class="grid-overlay__column"><span class="grid-overlay__label">6</span></div>
  </div>
</div>

<button class="grid-toggle" aria-label="Toggle grid overlay">
  <svg class="grid-toggle__icon" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
    <line x1="3" y1="0" x2="3" y2="18"/>
    <line x1="7" y1="0" x2="7" y2="18"/>
    <line x1="11" y1="0" x2="11" y2="18"/>
    <line x1="15" y1="0" x2="15" y2="18"/>
  </svg>
</button>
