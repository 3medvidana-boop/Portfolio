<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blog — Article</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cal+Sans&family=Inter:wght@100..900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/main.css">
</head>
<body>

  <!-- Header -->
  <header class="header">
    <a href="/" class="header__home" aria-label="Home">
      <img class="header__home-icon" src="../assets/images/logo56.svg" alt="Logo" width="56" height="56">
      <img class="header__menu-icon header__menu-icon--open" src="../assets/icons/icon-manu.svg" alt="Menu" width="48" height="48">
      <img class="header__menu-icon header__menu-icon--close" src="../assets/icons/icon-close.svg" alt="Close" width="48" height="48">
    </a>
    <div class="header__center">
      <span class="header__name">Anastasiia Medvid</span>
      <span class="header__role">UX/UI designer</span>
    </div>
    <a href="mailto:" class="header__email" aria-label="Email">
      <img class="header__email-icon" src="../assets/icons/icon-email.svg" alt="Email" width="48" height="48">
    </a>
    <a href="#" class="header__resume">
      <span class="header__resume-label">Resume</span>
      <img class="header__resume-arrow" src="../assets/icons/icon-arrow-right.svg" alt="" width="48" height="48">
    </a>
  </header>

  <!-- Mobile / Tablet menu -->
  <nav class="header__menu" aria-label="Main menu"></nav>

  <script src="../js/main.js"></script>
  <script src="../js/components/grid-overlay.js"></script>
  <script src="../js/components/resume-overlay.js"></script>
  <script src="../js/components/header-menu.js"></script>
</body>
</html>
